<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="tGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2D5E"/><stop offset="100%" stop-color="#1e4b8a"/>
    </linearGradient>
    <linearGradient id="tGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#ff9933"/>
    </linearGradient>
    <linearGradient id="tGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="tShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0A2D5E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#tGrad1)" opacity="0.03"/>
  <circle cx="180" cy="180" r="100" fill="url(#tGrad2)" opacity="0.03"/>

  <!-- Person 1 (left) - sitting at desk -->
  <g filter="url(#tShadow)">
    <!-- Body -->
    <rect x="85" y="210" width="60" height="70" rx="16" fill="url(#tGrad1)"/>
    <!-- Head -->
    <circle cx="115" cy="190" r="28" fill="#1e293b"/>
    <circle cx="115" cy="190" r="26" fill="#334155"/>
    <!-- Laptop screen in front -->
    <rect x="75" y="240" width="80" height="10" rx="2" fill="#475569"/>
    <rect x="80" y="210" width="70" height="30" rx="6" fill="#0f172a"/>
    <rect x="84" y="214" width="62" height="22" rx="4" fill="#ffffff"/>
    <!-- Code on screen -->
    <rect x="88" y="218" width="30" height="3" rx="1.5" fill="url(#tGrad2)" opacity="0.7"/>
    <rect x="88" y="224" width="40" height="3" rx="1.5" fill="#10b981" opacity="0.6"/>
    <rect x="88" y="230" width="25" height="3" rx="1.5" fill="#6366f1" opacity="0.5"/>
  </g>

  <!-- Person 2 (right) - standing, pointing -->
  <g filter="url(#tShadow)">
    <!-- Body -->
    <path d="M260 210 L280 210 L285 280 L255 280 Z" fill="url(#tGrad2)" rx="12"/>
    <rect x="253" y="210" width="34" height="70" rx="12" fill="url(#tGrad2)"/>
    <!-- Head -->
    <circle cx="270" cy="188" r="28" fill="#1e293b"/>
    <circle cx="270" cy="188" r="26" fill="#475569"/>
    <!-- Arm pointing -->
    <path d="M260 225 Q240 220 230 230" stroke="#475569" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="228" cy="232" r="5" fill="#475569"/>
    <!-- Hair -->
    <path d="M255 170 Q270 160 285 170" stroke="#0f172a" stroke-width="4" fill="none"/>
  </g>

  <!-- Person 3 (center foreground) - sitting w/ tablet -->
  <g filter="url(#tShadow)">
    <!-- Body -->
    <rect x="155" y="220" width="50" height="60" rx="14" fill="#1e293b"/>
    <!-- Head -->
    <circle cx="180" cy="200" r="26" fill="#334155"/>
    <circle cx="180" cy="200" r="24" fill="#1e293b"/>
    <!-- Tablet -->
    <rect x="155" y="235" width="50" height="38" rx="6" fill="#0f172a"/>
    <rect x="159" y="239" width="42" height="30" rx="4" fill="#ffffff"/>
    <rect x="163" y="243" width="25" height="3" rx="1.5" fill="url(#tGrad2)" opacity="0.6"/>
    <rect x="163" y="249" width="30" height="3" rx="1.5" fill="url(#tGrad1)" opacity="0.5"/>
    <rect x="163" y="255" width="20" height="3" rx="1.5" fill="#10b981" opacity="0.5"/>
    <!-- Glasses -->
    <circle cx="173" cy="198" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="187" cy="198" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="180" y1="198" x2="180" y2="198" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Connection lines between people -->
  <path d="M145 230 Q160 215 155 240" stroke="url(#tGrad2)" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.3"/>
  <path d="M210 230 Q230 220 260 225" stroke="url(#tGrad2)" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.3"/>

  <!-- Decorative elements -->
  <!-- Lightbulb icon -->
  <circle cx="340" cy="120" r="22" fill="rgba(255,102,0,0.06)"/>
  <path d="M340 108 L340 112" stroke="#ff6600" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M333 114 Q340 110 347 114" stroke="#ff6600" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <rect x="336" y="120" width="8" height="6" rx="2" fill="#ff6600" opacity="0.3"/>
  <rect x="336" y="128" width="8" height="2" rx="1" fill="#ff6600" opacity="0.3"/>
  <rect x="336" y="132" width="8" height="2" rx="1" fill="#ff6600" opacity="0.2"/>

  <circle cx="60" cy="130" r="5" fill="url(#tGrad2)" opacity="0.1"/>
  <circle cx="50" cy="160" r="3" fill="url(#tGrad3)" opacity="0.08"/>
  <circle cx="350" cy="300" r="4" fill="url(#tGrad1)" opacity="0.06"/>

  <!-- Chat bubbles -->
  <path d="M290 120 Q290 108 304 108 L318 108 Q332 108 332 120 L332 128 Q332 137 322 137 L308 137 L296 143 L300 137 L304 137 Q318 137 318 128" fill="none" stroke="url(#tGrad2)" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Stars -->
  <path d="M65 280 L68 286 L75 286 L70 291 L72 298 L65 294 L58 298 L60 291 L55 286 L62 286 Z" fill="url(#tGrad2)" opacity="0.08"/>
  <path d="M335 260 L337 264 L341 264 L338 267 L339 271 L335 269 L331 271 L332 267 L329 264 L333 264 Z" fill="url(#tGrad2)" opacity="0.06"/>
</svg>