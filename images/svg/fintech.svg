<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="fGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2D5E"/><stop offset="100%" stop-color="#1e4b8a"/>
    </linearGradient>
    <linearGradient id="fGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#ff9933"/>
    </linearGradient>
    <linearGradient id="fGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="fShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0A2D5E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#fGrad1)" opacity="0.03"/>
  <circle cx="200" cy="200" r="120" fill="url(#fGrad2)" opacity="0.03"/>

  <!-- Credit card 1 (main) -->
  <g filter="url(#fShadow)">
    <rect x="100" y="120" width="200" height="130" rx="16" fill="url(#fGrad1)"/>
    <!-- Card shine -->
    <rect x="100" y="120" width="200" height="130" rx="16" fill="url(#fGrad2)" opacity="0.08"/>
    <!-- Chip -->
    <rect x="120" y="145" width="30" height="22" rx="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="122" y="147" width="26" height="18" rx="3" fill="#f59e0b" opacity="0.3"/>
    <!-- Wave pattern -->
    <path d="M160 150 Q170 145 180 150 Q190 155 200 150" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.15"/>
    <!-- Card number -->
    <rect x="120" y="180" width="120" height="8" rx="4" fill="#fff" opacity="0.5"/>
    <rect x="250" y="180" width="30" height="8" rx="4" fill="#fff" opacity="0.3"/>
    <!-- Card details -->
    <rect x="120" y="200" width="50" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="220" y="200" width="60" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <!-- Circular icon right -->
    <circle cx="270" cy="155" r="15" fill="url(#fGrad2)" opacity="0.15"/>
    <text x="270" y="160" font-family="sans-serif" font-size="14" fill="#ff6600" text-anchor="middle" opacity="0.6">$</text>
  </g>

  <!-- Credit card 2 (small, angled) -->
  <g filter="url(#fShadow)" opacity="0.85">
    <rect x="130" y="225" width="180" height="100" rx="14" fill="#1e293b" transform="rotate(-6 130 225)"/>
    <rect x="145" y="245" width="25" height="18" rx="3" fill="#f59e0b" opacity="0.4"/>
    <rect x="145" y="275" width="80" height="7" rx="3.5" fill="#fff" opacity="0.4"/>
    <rect x="235" y="275" width="25" height="7" rx="3.5" fill="#fff" opacity="0.25"/>
  </g>

  <!-- Bank building icon (left) -->
  <g opacity="0.12">
    <rect x="50" y="260" width="40" height="50" rx="3" fill="#0A2D5E"/>
    <rect x="55" y="250" width="30" height="10" rx="2" fill="#0A2D5E"/>
    <rect x="60" y="270" width="20" height="15" rx="2" fill="#ff6600" opacity="0.3"/>
  </g>

  <!-- Coins floating (right) -->
  <g opacity="0.1">
    <circle cx="330" cy="240" r="12" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
    <text x="330" y="244" font-family="sans-serif" font-size="10" fill="#d97706" text-anchor="middle">₦</text>
    <circle cx="315" cy="260" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
    <text x="315" y="264" font-family="sans-serif" font-size="8" fill="#d97706" text-anchor="middle">₦</text>
    <circle cx="340" cy="270" r="9" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
    <text x="340" y="274" font-family="sans-serif" font-size="7" fill="#d97706" text-anchor="middle">₦</text>
  </g>

  <!-- Transaction list -->
  <rect x="115" y="290" width="170" height="5" rx="2.5" fill="#e2e8f0" opacity="0.2"/>
  <rect x="115" y="300" width="140" height="5" rx="2.5" fill="#e2e8f0" opacity="0.15"/>
  <rect x="115" y="310" width="160" height="5" rx="2.5" fill="#e2e8f0" opacity="0.12"/>

  <!-- Floating arrows (transfer) -->
  <path d="M80 160 L95 160 L88 153" stroke="url(#fGrad2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
  <path d="M95 160 L80 160 L88 167" stroke="url(#fGrad2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.1"/>

  <!-- Lock icon -->
  <circle cx="340" cy="130" r="18" fill="rgba(16,185,129,0.05)"/>
  <rect x="334" y="130" width="12" height="10" rx="4" fill="none" stroke="#10b981" stroke-width="2" opacity="0.2"/>
  <rect x="336" y="128" width="8" height="5" rx="2" fill="#10b981" opacity="0.15"/>
</svg>