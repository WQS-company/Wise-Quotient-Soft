<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="wGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2D5E"/><stop offset="100%" stop-color="#1e4b8a"/>
    </linearGradient>
    <linearGradient id="wGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#ff9933"/>
    </linearGradient>
    <filter id="wShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0A2D5E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#wGrad1)" opacity="0.03"/>
  <circle cx="200" cy="180" r="100" fill="url(#wGrad2)" opacity="0.03"/>

  <!-- Monitor -->
  <g filter="url(#wShadow)">
    <rect x="100" y="60" width="200" height="150" rx="12" fill="#1e293b"/>
    <rect x="108" y="68" width="184" height="135" rx="8" fill="#0f172a"/>
    <rect x="112" y="72" width="176" height="127" rx="6" fill="#ffffff"/>
    
    <!-- Website preview -->
    <rect x="112" y="72" width="176" height="16" fill="#f8fafc"/>
    <circle cx="122" cy="80" r="3" fill="#ef4444"/>
    <circle cx="131" cy="80" r="3" fill="#f59e0b"/>
    <circle cx="140" cy="80" r="3" fill="#10b981"/>
    <rect x="152" y="76" width="50" height="8" rx="4" fill="#e2e8f0"/>
    
    <!-- Nav bar -->
    <rect x="112" y="88" width="176" height="18" fill="url(#wGrad1)"/>
    <rect x="120" y="94" width="35" height="6" rx="3" fill="#fff" opacity="0.6"/>
    <rect x="160" y="94" width="20" height="6" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="185" y="94" width="20" height="6" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="260" y="92" width="20" height="10" rx="5" fill="url(#wGrad2)"/>

    <!-- Hero banner -->
    <rect x="112" y="106" width="176" height="40" fill="#f8fafc"/>
    <rect x="120" y="114" width="60" height="6" rx="3" fill="#0f172a" opacity="0.7"/>
    <rect x="120" y="124" width="80" height="4" rx="2" fill="#64748b"/>
    <rect x="120" y="132" width="50" height="10" rx="5" fill="url(#wGrad2)"/>

    <!-- Content cards -->
    <rect x="112" y="148" width="56" height="30" rx="4" fill="#f8fafc"/>
    <rect x="172" y="148" width="56" height="30" rx="4" fill="#f8fafc"/>
    <rect x="232" y="148" width="56" height="30" rx="4" fill="#f8fafc"/>
    
    <rect x="118" y="155" width="25" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="118" y="162" width="35" height="3" rx="1.5" fill="#f1f5f9"/>
    <rect x="178" y="155" width="25" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="178" y="162" width="35" height="3" rx="1.5" fill="#f1f5f9"/>
    <rect x="238" y="155" width="25" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="238" y="162" width="35" height="3" rx="1.5" fill="#f1f5f9"/>

    <!-- Footer -->
    <rect x="112" y="180" width="176" height="19" fill="#f1f5f9"/>
    <rect x="120" y="186" width="40" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="230" y="186" width="50" height="4" rx="2" fill="#e2e8f0"/>
  </g>

  <!-- Monitor stand -->
  <rect x="180" y="210" width="40" height="8" rx="4" fill="#334155"/>
  <rect x="192" y="218" width="16" height="20" rx="3" fill="#1e293b"/>
  <rect x="175" y="238" width="50" height="6" rx="3" fill="#1e293b"/>

  <!-- Code bracket decorations -->
  <path d="M55 120 L35 145 L55 170" stroke="url(#wGrad2)" stroke-width="2.5" fill="none" opacity="0.08"/>
  <path d="M345 100 L365 125 L345 150" stroke="url(#wGrad2)" stroke-width="2.5" fill="none" opacity="0.08"/>

  <!-- HTML tag decorations -->
  <text x="340" y="270" font-family="monospace" font-size="10" fill="#ff6600" opacity="0.08">&lt;/&gt;</text>
  <text x="40" y="280" font-family="monospace" font-size="10" fill="#0A2D5E" opacity="0.06">&lt;html&gt;</text>

  <!-- Floating code dots -->
  <circle cx="60" cy="250" r="3" fill="#10b981" opacity="0.1"/>
  <circle cx="340" cy="200" r="4" fill="#6366f1" opacity="0.08"/>
  <circle cx="50" cy="170" r="2.5" fill="#ff6600" opacity="0.08"/>
</svg>